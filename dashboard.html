    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        * { box-sizing: border-box; }
        body { background-color:#030712; color:white; font-family:'Cairo',sans-serif; overflow-x:hidden; }

        /* === خلفية === */
        .ramadan-bg {
            position:fixed; inset:-10%; z-index:-2;
            background-image: linear-gradient(to bottom,rgba(5,8,20,0.82),rgba(3,7,18,0.97)),
                              url('https://i.postimg.cc/TpjGQ5xs/image.jpg');
            background-size:cover; background-position:center;
            animation:smoothPan 25s infinite alternate ease-in-out;
        }
        @keyframes smoothPan {
            0%  { transform:scale(1.00) translate(0,0); }
            50% { transform:scale(1.05) translate(-1%,1%); }
            100%{ transform:scale(1.10) translate(1%,-1%); }
        }
        .stars-layer {
            position:fixed; inset:0; z-index:-1; pointer-events:none;
            background-image:
                radial-gradient(1px 1px at 15% 12%, rgba(255,255,255,0.8) 0%,transparent 100%),
                radial-gradient(1px 1px at 35% 25%, rgba(255,255,255,0.6) 0%,transparent 100%),
                radial-gradient(1px 1px at 55%  8%, rgba(255,255,255,0.9) 0%,transparent 100%),
                radial-gradient(1px 1px at 75% 18%, rgba(255,255,255,0.7) 0%,transparent 100%),
                radial-gradient(1px 1px at 90%  5%, rgba(255,255,255,0.8) 0%,transparent 100%),
                radial-gradient(1px 1px at 10% 40%, rgba(255,255,255,0.4) 0%,transparent 100%),
                radial-gradient(1px 1px at 48% 35%, rgba(255,255,255,0.6) 0%,transparent 100%),
                radial-gradient(circle at 20% 30%, rgba(212,175,55,0.10) 0%,transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(59,130,246,0.10) 0%,transparent 40%);
        }

        /* === فوانيس === */
        .lantern-wrap { position:fixed; top:0; z-index:200; pointer-events:none; }
        .lantern-wrap.r { right:14px; transform-origin:top center; animation:swingR 3.5s ease-in-out infinite; }
        .lantern-wrap.l { left:14px;  transform-origin:top center; animation:swingL 3.2s ease-in-out infinite; }
        @keyframes swingR { 0%{transform:rotate(-9deg)} 50%{transform:rotate(9deg)} 100%{transform:rotate(-9deg)} }
        @keyframes swingL { 0%{transform:rotate(9deg)} 50%{transform:rotate(-9deg)} 100%{transform:rotate(9deg)} }

        .l-string { width:2px; height:40px; background:linear-gradient(to bottom,rgba(255,255,255,0.45),rgba(255,255,255,0.1)); margin:0 auto; }
        .l-body {
            width:24px; height:36px; margin:0 auto;
            background:rgba(255,255,255,0.94);
            border-radius:4px 4px 6px 6px; position:relative;
            animation:lGlow 2.8s ease-in-out infinite;
        }
        @keyframes lGlow {
            0%,100%{ box-shadow:0 0 10px 4px rgba(255,255,255,0.55),0 0 22px 7px rgba(255,255,240,0.28),inset 0 0 7px rgba(255,255,200,0.35); }
            50%    { box-shadow:0 0 18px 7px rgba(255,255,255,0.82),0 0 36px 13px rgba(255,255,240,0.48),inset 0 0 12px rgba(255,255,200,0.60); }
        }
        .l-body::before {
            content:''; position:absolute; top:-8px; left:50%; transform:translateX(-50%);
            width:11px; height:8px;
            background:rgba(255,255,255,0.72); border-radius:2px 2px 0 0;
            box-shadow:0 0 6px rgba(255,255,255,0.5);
        }
        .l-body::after {
            content:''; position:absolute; bottom:-9px; left:50%; transform:translateX(-50%);
            width:2px; height:9px; background:rgba(255,255,255,0.45);
        }

        /* === شريط علوي === */
        .top-bar {
            background:linear-gradient(135deg,rgba(8,12,28,0.92),rgba(18,28,52,0.88));
            border-bottom:1px solid rgba(212,175,55,0.20);
            backdrop-filter:blur(18px);
        }

        /* === بطاقات عامة === */
        .glass-card {
            background:rgba(12,19,38,0.65); border:1px solid rgba(212,175,55,0.25);
            backdrop-filter:blur(14px); box-shadow:0 8px 28px rgba(0,0,0,0.65);
        }

        /* === تبويبات === */
        .tab-btn { color:rgba(255,255,255,0.6); transition:all .25s ease; font-size:13px; }
        .tab-btn.active { background:linear-gradient(90deg,#b8860b,#ffd700); color:#000; font-weight:900; box-shadow:0 4px 14px rgba(212,175,55,0.40); }
        .tab-btn:not(.active):hover { color:rgba(255,255,255,.9); }

        /* === بطاقات الأيام === */
        .day-done {
            background:linear-gradient(135deg,rgba(6,78,59,0.35),rgba(5,46,22,0.50));
            border:1px solid rgba(34,197,94,0.30); border-right:4px solid #22c55e;
            border-radius:18px; padding:15px 17px;
            display:flex; justify-content:space-between; align-items:center;
            transition:transform .2s ease;
        }
        .day-done:hover { transform:translateX(-3px); }

        .day-active {
            background:linear-gradient(135deg,rgba(212,175,55,0.18),rgba(0,0,0,0.80));
            border:2px solid #ffd700; border-radius:18px; padding:17px;
            display:flex; justify-content:space-between; align-items:center;
            cursor:pointer; animation:neonPulse 2s infinite;
            transition:transform .2s ease;
        }
        .day-active:hover { transform:scale(1.02); }
        @keyframes neonPulse {
            0%  { box-shadow:0 0 0 0 rgba(255,215,0,.7); }
            70% { box-shadow:0 0 0 16px rgba(255,215,0,0); }
            100%{ box-shadow:0 0 0 0 rgba(255,215,0,0); }
        }

        .day-locked {
            background:rgba(10,15,30,0.45); border:1px solid rgba(255,255,255,0.05);
            border-radius:16px; padding:13px 17px;
            display:flex; align-items:center; gap:14px;
        }

        /* === عجلة الحظ === */
        .legendary-wheel {
            background:conic-gradient(#064e3b 0 60deg,#78350f 60deg 120deg,#1e3a8a 120deg 180deg,#4c1d95 180deg 240deg,#7f1d1d 240deg 300deg,#0f172a 300deg 360deg);
            border-radius:50%; border:8px solid #fbbf24;
            box-shadow:0 0 50px rgba(251,191,36,.6),inset 0 0 40px rgba(0,0,0,.9);
            position:relative;
        }

        /* === كويز أوفرلاي === */
        #quiz-overlay { position:fixed; inset:0; background:rgba(3,7,18,.98); z-index:2147483647!important; display:none; align-items:center; justify-content:center; padding:10px; }
        .quiz-box { width:100%; max-width:450px; background:linear-gradient(145deg,#0f172a,#030712); border:1px solid rgba(212,175,55,.5); border-radius:20px; padding:20px; box-shadow:0 25px 50px -12px rgba(0,0,0,.9); }

        .logo-fix { object-fit:cover; border-radius:50%; background-color:#030712; }

        body.hide-ads #main-ui, body.hide-ads iframe, body.hide-ads ins { display:none!important; }
        body.hide-ads { overflow:hidden!important; background:#030712!important; }

        /* === تحذير مكافحة الغش === */
        #ac-modal {
            position:fixed; inset:0; background:rgba(0,0,0,.92);
            z-index:99999999; display:none;
            align-items:center; justify-content:center; padding:20px;
            backdrop-filter:blur(10px);
        }
        #ac-modal.show { display:flex; }
        .ac-box {
            background:linear-gradient(145deg,#1a0808,#0d0404);
            border:2px solid rgba(239,68,68,.65); border-radius:24px;
            padding:32px 24px; max-width:360px; width:100%;
            text-align:center;
            box-shadow:0 0 70px rgba(239,68,68,.30),0 25px 50px rgba(0,0,0,.85);
            animation:acPop .4s cubic-bezier(.175,.885,.32,1.275);
        }
        @keyframes acPop { from{transform:scale(.7);opacity:0} to{transform:scale(1);opacity:1} }
        .ac-icon { font-size:64px; margin-bottom:12px; display:block; animation:acShake .5s ease .3s; }
        @keyframes acShake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
        .ac-btn {
            width:100%; padding:13px; border-radius:14px; border:none; cursor:pointer;
            font-family:'Cairo',sans-serif; font-weight:900; font-size:15px;
            transition:transform .15s; margin-top:10px;
        }
        .ac-btn:hover { transform:scale(1.03); }
        .ac-btn.green { background:linear-gradient(135deg,#16a34a,#15803d); color:white; box-shadow:0 4px 14px rgba(22,163,74,.4); }
        .ac-btn.red   { background:linear-gradient(135deg,#991b1b,#7f1d1d); color:#fca5a5; border:1px solid rgba(239,68,68,.35); }

        /* بطاقة اللاعب */
        .player-card {
            background:linear-gradient(135deg,rgba(12,19,40,.78),rgba(20,30,62,.65));
            border:1px solid rgba(212,175,55,.32); border-radius:24px; padding:16px;
            backdrop-filter:blur(16px);
            box-shadow:0 8px 32px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.04);
        }
        .score-pill {
            background:linear-gradient(135deg,rgba(212,175,55,.14),rgba(212,175,55,.04));
            border:1px solid rgba(212,175,55,.38); border-radius:16px; padding:10px; text-align:center; min-width:62px;
        }

        /* وميض عجلة */
        @keyframes spinGlow { 0%,100%{box-shadow:0 0 0 0 rgba(212,175,55,.5)} 50%{box-shadow:0 0 0 12px rgba(212,175,55,0)} }
        .spin-glow { animation:spinGlow 2s ease-in-out infinite; }

        /* === سؤال الليلة CSS === */
        .night-star {
            position:absolute; width:2px; height:2px; background:white; border-radius:50%;
            animation: starTwinkle 2.5s ease-in-out infinite;
        }
        @keyframes starTwinkle {
            0%,100% { opacity:0.2; transform:scale(1); }
            50%      { opacity:1;   transform:scale(1.6); }
        }
        @keyframes moonPulse {
            0%,100% { box-shadow:0 0 24px rgba(139,92,246,0.35); }
            50%      { box-shadow:0 0 38px rgba(139,92,246,0.60); }
        }


    </style>
</head>
<body class="relative">
    <div class="ramadan-bg"></div>
    <div class="stars-layer"></div>

    <!-- فوانيس -->
    <div class="lantern-wrap r"><div class="l-string"></div><div class="l-body"></div></div>
    <div class="lantern-wrap l"><div class="l-string"></div><div class="l-body"></div></div>

    <!-- تحذير مكافحة الغش -->
    <div id="ac-modal">
        <div class="ac-box">
            <span class="ac-icon">🚨</span>
            <h2 style="color:#ef4444;font-size:22px;font-weight:900;margin-bottom:8px;">تحذير!</h2>
            <p id="ac-msg" style="color:#fca5a5;font-size:14px;font-weight:700;line-height:1.75;margin-bottom:4px;">
                حاولت الخروج من الكويز!
            </p>
            <p style="color:#f87171;font-size:12px;font-weight:700;margin-bottom:18px;">النقاط محتسبة حتى هذه اللحظة.</p>
            <button class="ac-btn green" onclick="acContinue()">✅ أكمل الكويز</button>
            <button class="ac-btn red"   onclick="acExit()">خروج (النقاط ستُحسب) 🚪</button>
        </div>
    </div>

    <!-- تنبيه مخصص -->

            <h3 id="alert-title" class="text-2xl font-black mb-2"></h3>

                <i class="fas fa-snowflake text-blue-400" style="font-size:11px;"></i>
