<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>ملعب رمضان | التحدي الأكبر</title>
    
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script defer src="app.js?v=200"></script>
    <script defer src="quiz.js?v=200"></script>

    <script src="https://pl28752538.effectivegatecpm.com/c3/3c/34/c33c34082705fc844e7a83f1bbebcf42.js"></script>
    <script src="https://pl28773459.effectivegatecpm.com/0c/2e/75/0c2e7503a2abb6a631fb27fdf3b7ae02.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { background-color: #030712; color: white; font-family: 'Cairo', sans-serif; background-image: radial-gradient(circle at top right, #112240, #030712); background-attachment: fixed; overflow-x: hidden; }
        .glass-card { background: rgba(17, 24, 39, 0.6); border: 1px solid rgba(212, 175, 55, 0.2); backdrop-filter: blur(12px); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5); }
        .tab-btn { transition: 0.4s; cursor: pointer; }
        .tab-btn.active { background: linear-gradient(90deg, #b8860b, #ffd700); color: #000; font-weight: 900; transform: scale(1.02); }
        .day-active { border: 2px solid #ffd700; background: linear-gradient(145deg, rgba(212,175,55,0.1), rgba(0,0,0,0.8)); animation: neonPulse 2s infinite; cursor: pointer; }
        @keyframes neonPulse { 0% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(255, 215, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); } }
        
        body.hide-ads #main-ui, body.hide-ads iframe, body.hide-ads ins { display: none !important; }
        body.hide-ads { overflow: hidden !important; background: #030712 !important; }

        #quiz-overlay { position: fixed; inset: 0; background: rgba(3, 7, 18, 0.98); z-index: 2147483647 !important; display: none; align-items: center; justify-content: center; padding: 15px; }
        .quiz-box { width: 100%; max-width: 450px; background: linear-gradient(145deg, #111827, #0f172a); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 24px; padding: 32px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8); position: relative; overflow: hidden; }
        .quiz-box::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #b8860b, #ffd700, #b8860b); }
    </style>
</head>
<body class="relative">

    <div id="splash-screen" class="fixed inset-0 z-[999999] flex flex-col items-center justify-center bg-[#030712] transition-opacity duration-700">
        <div class="glass-card p-10 rounded-3xl flex flex-col items-center text-center border border-yellow-500/30 shadow-[0_0_50px_rgba(212,175,55,0.15)] transform transition-transform duration-700 w-11/12 max-w-sm">
            <div class="relative mb-6">
                <div class="absolute inset-0 bg-yellow-500 blur-xl opacity-40 rounded-2xl animate-pulse"></div>
                <img src="https://i.postimg.cc/9Fpp5TVC/IMG-20260217-031514.png" class="relative w-32 h-32 object-cover rounded-2xl shadow-[0_0_25px_rgba(212,175,55,0.5)] border-2 border-yellow-500 animate-bounce">
            </div>
            <h2 class="text-3xl font-black text-white mb-3 tracking-wide">أهلاً بيك يا <span id="splash-name" class="text-yellow-400 drop-shadow-md">بطل</span>! 👋</h2>
            <p class="text-gray-300 font-bold text-lg mb-6">جاهز لكويز النهاردة؟ 🚀</p>
            <div class="flex gap-2">
                <div class="w-3 h-3 bg-gradient-to-r from-yellow-600 to-yellow-400 rounded-full animate-ping"></div>
                <div class="w-3 h-3 bg-gradient-to-r from-yellow-600 to-yellow-400 rounded-full animate-ping" style="animation-delay: 0.2s"></div>
                <div class="w-3 h-3 bg-gradient-to-r from-yellow-600 to-yellow-400 rounded-full animate-ping" style="animation-delay: 0.4s"></div>
            </div>
        </div>
    </div>

    <div id="main-ui" class="hidden opacity-0 transition-opacity duration-1000 p-4 pb-24">
        
        <div id="champ-flying-popup" class="fixed top-4 left-1/2 transform -translate-x-1/2 w-11/12 max-w-sm z-[5000] transition-all duration-700 opacity-0 -translate-y-10" style="display:none;">
            <div id="champ-popup-card" class="bg-gradient-to-r from-yellow-600 via-yellow-400 to-yellow-600 p-[2px] rounded-2xl shadow-[0_10px_40px_rgba(212,175,55,0.4)]">
                <div class="bg-gray-900 rounded-[14px] p-4 flex flex-col relative overflow-hidden">
                    <button onclick="closeChampPopup()" class="absolute top-2 left-3 text-gray-400 hover:text-white font-black text-xl">&times;</button>
                    <div class="flex items-center gap-3 mb-2 border-b border-gray-800 pb-2">
                        <div class="bg-yellow-500/20 p-2 rounded-full"><i class="fas fa-crown text-2xl text-yellow-400 animate-bounce"></i></div>
                        <h2 class="text-lg font-black text-white">تحية لبطل اليوم!</h2>
                    </div>
                    <p id="champ-popup-text" class="text-yellow-400 font-bold text-sm leading-relaxed pr-1"></p>
                </div>
            </div>
        </div>

        <div class="sticky top-2 z-[4000] max-w-lg mx-auto mb-6">
            <div id="daily-msg-box" class="bg-gradient-to-r from-blue-900/90 to-purple-900/90 border border-blue-500 p-3 rounded-2xl text-center text-sm text-blue-100 hidden shadow-[0_4px_20px_rgba(0,0,255,0.3)] font-bold backdrop-blur-md"></div>
        </div>

        <div class="flex justify-between items-center max-w-lg mx-auto mb-4">
            <button onclick="logoutUser()" class="bg-gray-800/80 text-red-400 border border-red-900/50 px-5 py-2 rounded-xl text-xs font-black shadow-lg hover:bg-red-900 hover:text-white transition-all"><i class="fas fa-power-off ml-1"></i> خروج</button>
            <img src="https://i.postimg.cc/9Fpp5TVC/IMG-20260217-031514.png" class="w-12 h-12 rounded-full border-2 border-yellow-500 shadow-[0_0_15px_rgba(212,175,55,0.3)]">
        </div>

        <header class="glass-card p-4 rounded-3xl mb-8 max-w-lg mx-auto relative overflow-hidden border border-yellow-500/20 shadow-lg">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-yellow-600 to-yellow-300"></div>
            
            <div class="flex justify-between items-center gap-2">
                <div class="flex items-center gap-3 w-3/4 overflow-hidden">
                    <div class="bg-gradient-to-br from-yellow-500 to-yellow-700 w-12 h-12 rounded-xl flex items-center justify-center text-black shadow-md flex-shrink-0">
                        <i class="fas fa-shield-alt text-xl"></i>
                    </div>
                    <div class="flex flex-col overflow-hidden w-full">
                        <div class="flex items-center gap-2 mb-1">
                            <h2 id="p-name" class="font-black text-white text-sm truncate">...</h2>
                            <span id="p-streak" class="text-orange-400 font-bold text-[10px] bg-orange-900/40 px-1.5 py-0.5 rounded border border-orange-700/50 flex-shrink-0 hidden">🔥 0</span>
                        </div>
                        <div class="flex flex-wrap gap-1">
                            <span id="p-group" class="text-yellow-400 font-bold bg-gray-800 px-2 py-0.5 rounded text-[10px] border border-gray-600 truncate max-w-[100px] hidden">...</span>
                            <span id="p-rank" class="font-bold text-[10px] px-2 py-0.5 rounded border border-gray-600 hidden">...</span>
                        </div>
                    </div>
                </div>

                <div class="bg-gray-900/80 rounded-xl p-2 w-1/4 border border-gray-700 shadow-inner text-center flex-shrink-0">
                    <p class="text-[9px] text-gray-400 font-bold mb-0.5">نقاطك</p>
                    <p id="p-score" class="font-black text-xl text-yellow-400 drop-shadow-md">0</p>
                </div>
            </div>

            <div class="mt-4 bg-gray-900/60 p-2.5 rounded-xl border border-gray-700/50">
                <div class="flex justify-between text-[10px] text-gray-400 mb-1.5 font-bold">
                    <span>تقدمك في البطولة</span><span id="progress-text" class="text-yellow-500">0 / 29 جولة</span>
                </div>
                <div class="w-full bg-gray-800 h-2 rounded-full overflow-hidden shadow-inner">
                    <div id="progress-bar" class="h-full bg-gradient-to-r from-yellow-600 to-yellow-400 rounded-full transition-all duration-500" style="width: 0%;"></div>
                </div>
            </div>
        </header>

        <div class="flex bg-gray-800/80 p-1.5 rounded-2xl mb-6 max-w-lg mx-auto border border-gray-700 shadow-xl backdrop-blur-sm">
            <button onclick="showTab('arena')" id="btn-arena" class="tab-btn active flex-1 py-3 text-sm rounded-xl font-bold">الخريطة 🗺️</button>
            <button onclick="showTab('leaderboard')" id="btn-leader" class="tab-btn flex-1 py-3 text-sm rounded-xl font-bold">المجموعة 🏆</button>
        </div>

        <div id="view-arena" class="max-w-lg mx-auto space-y-4 pb-10"></div>
        
        <div id="view-leaderboard" class="max-w-lg mx-auto hidden pb-10">
            <div class="glass-card p-6 rounded-3xl">
                <h3 class="text-center text-white font-black mb-6 border-b border-gray-700 pb-3">ترتيب مجموعتك</h3>
                <div id="group-list" class="space-y-3"></div>
            </div>
        </div>
    </div> 

    <div id="quiz-overlay"><div class="quiz-box" id="quiz-content"></div></div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const splashScreen = document.getElementById('splash-screen');
            const splashName = document.getElementById('splash-name');
            const mainUi = document.getElementById('main-ui');
            
            try {
                let u = JSON.parse(localStorage.getItem('currentUser'));
                if (u && u.name) splashName.innerText = u.name.split(' ')[0];
            } catch(e) {}

            if (!sessionStorage.getItem('splashSeen')) {
                setTimeout(() => {
                    splashScreen.style.opacity = '0';
                    setTimeout(() => {
                        splashScreen.style.display = 'none';
                        mainUi.classList.remove('hidden');
                        setTimeout(() => { mainUi.classList.remove('opacity-0'); }, 50);
                    }, 700);
                }, 3000);
                sessionStorage.setItem('splashSeen', 'true');
            } else {
                splashScreen.style.display = 'none';
                mainUi.classList.remove('hidden', 'opacity-0');
            }
        });
    </script>
</body>
                    </html>
