<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ملعب رمضان | الخريطة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { background-color: #0b1120; font-family: 'Cairo', sans-serif; color: white; margin: 0; overflow-x: hidden; user-select: none; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        
        @keyframes swing-mini { 0% { transform: rotate(7deg); } 50% { transform: rotate(-7deg); } 100% { transform: rotate(7deg); } }
        .fanous-mini { width: 28px; transform-origin: top center; animation: swing-mini 2.5s ease-in-out infinite; position: absolute; right: -8px; top: -12px; z-index: 20; }

        .tab-btn.active { background: linear-gradient(135deg, #eab308 0%, #ca8a04 100%); color: black; font-weight: 900; }
        .day-active { background: linear-gradient(135deg, #eab308 0%, #ca8a04 100%); color: black; border: 2px solid #fde047; box-shadow: 0 0 15px rgba(234, 179, 8, 0.3); }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

    <div class="p-6 flex items-center justify-between">
        <button onclick="logoutUser()" class="text-red-400 font-bold flex items-center gap-2 bg-red-500/10 px-4 py-2 rounded-xl">
            <i class="fas fa-power-off text-sm"></i> خروج
        </button>
        <div class="flex gap-3">
            <div class="bg-gray-800 px-4 py-2 rounded-xl border border-gray-700 flex items-center gap-2">
                <span id="inv-5050" class="text-purple-400 font-black">0</span> <i class="fas fa-cut text-purple-400 text-xs"></i>
            </div>
            <div class="bg-gray-800 px-4 py-2 rounded-xl border border-gray-700 flex items-center gap-2">
                <span id="inv-freeze" class="text-blue-400 font-black">0</span> <i class="fas fa-snowflake text-blue-400 text-xs"></i>
            </div>
        </div>
    </div>

    <div class="px-6 mb-8">
        <div class="glass-card p-6 rounded-[35px] flex items-center justify-between relative border border-white/10">
            <div class="relative">
                <img src="https://i.ibb.co/m0Ym8pL/fanous.png" class="fanous-mini">
                <div class="w-16 h-16 rounded-full border-2 border-yellow-500 p-1 bg-gray-900">
                    <img id="user-avatar" src="https://i.postimg.cc/QN7YYDZb/1772330473684.png" class="w-full h-full rounded-full object-cover">
                </div>
            </div>
            <div class="flex-1 mr-4">
                <h2 id="p-name" class="font-black text-xl truncate w-32 text-white">تحميل...</h2>
                <p id="p-group" class="text-gray-400 text-[10px] font-bold">المجموعة</p>
            </div>
            <div class="text-center bg-black/40 px-5 py-3 rounded-2xl border border-white/5">
                <p class="text-[9px] text-gray-400 font-black uppercase">النقاط</p>
                <p id="p-score" class="text-2xl font-black text-yellow-500">0</p>
            </div>
        </div>
    </div>

    <div class="px-6 flex gap-2 mb-6">
        <button id="btn-arena" onclick="showTab('arena')" class="tab-btn active flex-1 py-4 rounded-2xl font-black">🗺️ الخريطة</button>
        <button id="btn-leader" onclick="showTab('leaderboard')" class="tab-btn flex-1 py-4 rounded-2xl font-black bg-gray-800 text-gray-400">🏆 المجموعة</button>
    </div>

    <div id="view-arena" class="px-6 space-y-4"></div>
    <div id="view-leaderboard" class="px-6 hidden">
        <div id="group-list" class="space-y-2"></div>
    </div>

    <div id="quiz-overlay" class="fixed inset-0 bg-black/95 z-[100] hidden flex flex-col items-center justify-center p-6 backdrop-blur-md">
        <div id="quiz-content" class="w-full max-w-md"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="app.js"></script>
    <script src="quiz.js"></script>

    <script>
        // حماية إضافية من تعطيل الزر الأيمن
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) return false;
        }
    </script>
</body>
</html>
