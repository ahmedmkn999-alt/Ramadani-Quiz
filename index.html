<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b1120">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/QN7YYDZb/1772330473684.png">
    
    <title>ملعب رمضان | تسجيل الدخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { background-color: #030712; color: white; font-family: 'Cairo', sans-serif; overflow: hidden; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(212, 175, 55, 0.2); }
        
        /* 🏮 أنيميشن اهتزاز الفانوس */
        @keyframes swing {
            0% { transform: rotate(8deg); }
            50% { transform: rotate(-8deg); }
            100% { transform: rotate(8deg); }
        }
        .fanous-container {
            position: absolute;
            top: -110px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            transform-origin: top center;
            animation: swing 3s ease-in-out infinite;
        }
        .fanous-img { width: 100px; filter: drop-shadow(0 0 15px rgba(234, 179, 8, 0.4)); }

        /* انيميشن لرسالة الآيفون */
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .ios-guide { animation: slideUp 0.5s ease-out; border-radius: 30px 30px 0 0; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    
    <div id="login-box" class="glass-card p-8 rounded-[40px] w-full max-w-sm text-center shadow-2xl relative">
        
        <div class="absolute -top-12 left-1/2 -translate-x-1/2">
            <div class="fanous-container">
                <img src="https://i.ibb.co/m0Ym8pL/fanous.png" class="fanous-img">
            </div>
            <img src="https://i.postimg.cc/QN7YYDZb/1772330473684.png" class="w-24 h-24 rounded-full border-4 border-yellow-500 shadow-[0_0_20px_rgba(212,175,55,0.5)]">
        </div>
        
        <h1 class="text-3xl font-black mt-14 mb-2 text-white italic">RAMADAN QUIZ</h1>
        <p class="text-yellow-500 text-[10px] font-bold tracking-[0.3em] mb-8 uppercase">The Ultimate Challenge</p>

        <div class="space-y-4">
            <input type="password" id="login-pass" placeholder="كود الدخول" 
                class="w-full bg-black/40 border border-white/10 p-4 rounded-2xl text-center font-black text-2xl text-yellow-400 focus:border-yellow-500 outline-none transition-all">
            
            <button onclick="handleLoginAttempt()" class="w-full bg-gradient-to-r from-yellow-600 to-yellow-500 text-black font-black py-4 rounded-2xl text-xl shadow-lg active:scale-95 transition-transform">
                دخول الملعب ⚽
            </button>
        </div>
        <p id="error-msg" class="text-red-500 text-xs mt-4 font-bold hidden"></p>
    </div>

    <div id="ios-overlay" class="fixed inset-0 bg-black/90 z-[9999] hidden flex-col justify-end">
        <div class="ios-guide bg-gray-900 p-8 text-center border-t-2 border-yellow-500">
            <h2 class="text-2xl font-black text-white mb-4">ثبت التطبيق للدخول! 📱</h2>
            <p class="text-gray-400 text-sm mb-6">اضغط على زر المشاركة <i class="fa-solid fa-arrow-up-from-bracket text-blue-400"></i> ثم "إضافة إلى الشاشة الرئيسية" <i class="fa-regular fa-square-plus"></i></p>
            <button onclick="location.reload()" class="w-full bg-gray-800 text-white font-black py-4 rounded-2xl">فهمت</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyBZMnIJ_IOqeAfXqFt-m4tM1Lvo0tUDnk8", projectId: "ramadan-87817", appId: "1:343525703258:web:6776b4857425df8bcca263" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function handleLoginAttempt() {
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
            const pass = document.getElementById('login-pass').value.trim();

            if (!isStandalone) {
                if (isIOS) document.getElementById('ios-overlay').style.display = 'flex';
                else alert("يرجى تثبيت التطبيق أولاً من خيارات المتصفح (Install App)");
                return;
            }

            db.collection("users").where("password", "==", pass).get().then(snap => {
                if (snap.empty) {
                    document.getElementById('error-msg').innerText = "❌ الكود غلط يا بطل";
                    document.getElementById('error-msg').classList.remove('hidden');
                } else {
                    const user = snap.docs[0].data();
                    localStorage.setItem('currentUser', JSON.stringify({id: snap.docs[0].id, ...user}));
                    window.location.href = 'dashboard.html';
                }
            });
        }
    </script>
</body>
</html>
