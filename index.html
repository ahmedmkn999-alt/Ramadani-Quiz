<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b1120">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/QN7YYDZb/1772330473684.png">
    <title>ملعب رمضان | RAMADAN QUIZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { background-color: #0b1120; color: white; font-family: 'Cairo', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .bg-glow { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 10% 10%, rgba(212, 175, 55, 0.15) 0%, transparent 40%), radial-gradient(circle at 90% 90%, rgba(59, 130, 246, 0.15) 0%, transparent 40%); }
        .glass-card { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(212, 175, 55, 0.2); width: 90%; max-width: 380px; border-radius: 2.5rem; padding: 2.5rem; }
        .logo-img { width: 120px; height: 120px; margin: 0 auto 1.5rem; border-radius: 50%; border: 3px solid #ca8a04; object-fit: cover; box-shadow: 0 0 25px rgba(202, 138, 4, 0.4); }
        .btn-gold { background: linear-gradient(135deg, #ca8a04, #eab308); color: #000; font-weight: 900; }
        .btn-green { background: #10b981 !important; color: white !important; font-weight: 900; }
        #install-overlay { position: fixed; inset: 0; background: rgba(11, 17, 32, 0.98); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div id="login-container" class="glass-card text-center">
        <img src="https://i.postimg.cc/QN7YYDZb/1772330473684.png" class="logo-img">
        <h1 class="text-3xl font-black mb-1 italic">RAMADAN QUIZ</h1>
        <p class="text-yellow-500 text-[11px] font-bold mb-8 tracking-[0.2em]">The Ultimate Challenge</p>
        <div class="space-y-4">
            <input type="password" id="login-pass" placeholder="أدخل كود الدخول" class="bg-black/40 border border-white/10 w-full p-4 rounded-2xl text-center font-black text-2xl text-yellow-400">
            <button onclick="loginUser()" id="login-btn" class="btn-gold w-full py-4 rounded-2xl text-xl">دخول الملعب ⚽</button>
        </div>
        <p id="error-msg" class="text-red-500 text-xs mt-4 font-bold opacity-0 transition-opacity"></p>
    </div>

    <div id="install-overlay">
        <div class="glass-card text-center">
            <h2 class="text-3xl font-black text-white mb-3">ثبت التطبيق! 🚀</h2>
            <p id="install-text" class="text-gray-400 text-sm mb-8 font-bold leading-relaxed">عشان تدخل الملعب علطول وتلعب بدون تقطيع، ثبت التطبيق دلوقتي.</p>
            <button id="real-install-btn" onclick="triggerInstall()" class="btn-green w-full py-5 rounded-2xl text-xl mb-4">تثبيت الآن</button>
            <button onclick="skipToDashboard()" class="text-gray-500 underline text-sm font-bold">متابعة للموقع بدون تثبيت</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyBZMnIJ_IOqeAfXqFt-m4tM1Lvo0tUDnk8", projectId: "ramadan-87817", appId: "1:343525703258:web:6776b4857425df8bcca263" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let deferredPrompt;
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const isApp = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        function loginUser() {
            const p = document.getElementById('login-pass').value.trim();
            if (!p) return alert("اكتب الكود!");
            
            db.collection("users").where("password", "==", p).get().then(snap => {
                if (snap.empty) return alert("كود خطأ!");
                const user = snap.docs[0].data();
                localStorage.setItem('currentUser', JSON.stringify({id: snap.docs[0].id, ...user}));
                
                if (isApp) {
                    window.location.href = 'dashboard.html';
                } else {
                    document.getElementById('login-container').classList.add('hidden');
                    document.getElementById('install-overlay').style.display = 'flex';
                    if(isIOS) {
                        document.getElementById('install-text').innerText = "للآيفون: اضغط على زر المشاركة بالأسفل ثم (Add to Home Screen) ➕";
                        document.getElementById('real-install-btn').style.display = 'none';
                    }
                }
            });
        }

        function skipToDashboard() { window.location.href = 'dashboard.html'; }
        
        function triggerInstall() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(c => { if(c.outcome==='accepted') skipToDashboard(); });
            } else {
                alert("اضغط على خيارات المتصفح ثم Install App");
            }
        }
    </script>
</body>
</html>
